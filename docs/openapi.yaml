openapi: 3.0.3

info:
  title: T17 Semantic Analysis API
  version: 1.0.0
  description: Specificatie OpenAPI pentru proiectul T17 - Analiza Semantica Cod Sursa.

servers:
  - url: http://localhost:8080
    description: Server local pentru analiza codului sursa

paths:
  /auth/login:
    post:
      summary: Autentifica un utilizator
      description: Primeste username si password si intoarce rolul utilizatorului.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Autentificare reusita
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Date de autentificare invalide

  /analyze:
    post:
      summary: Analizeaza un fisier sursa
      description: Primeste un fisier sursa C/C++ si intoarce un raport de analiza.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                sourceFile:
                  type: string
                  format: binary
      responses:
        '200':
          description: Analiza realizata cu succes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisResult'
        '400':
          description: Cerere invalida
        '401':
          description: Utilizator neautentificat
        '500':
          description: Eroare interna la analiza

  /reports/{reportId}:
    get:
      summary: Returneaza un raport de analiza
      description: Intoarce raportul generat pentru o analiza anterioara.
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
          example: sample_report
      responses:
        '200':
          description: Raport returnat cu succes
          content:
            text/plain:
              schema:
                type: string
        '401':
          description: Utilizator neautentificat
        '404':
          description: Raportul nu a fost gasit

  /admin/stats:
    get:
      summary: Returneaza statistici server
      description: Intoarce informatii despre statusul serverului si fisierele analizate.
      responses:
        '200':
          description: Statistici returnate cu succes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerStats'
        '401':
          description: Utilizator neautentificat
        '403':
          description: Permisiuni insuficiente

  /admin/logs:
    get:
      summary: Returneaza logurile serverului
      description: Intoarce continutul fisierului logs/server.log.
      responses:
        '200':
          description: Loguri returnate cu succes
          content:
            text/plain:
              schema:
                type: string
        '401':
          description: Utilizator neautentificat
        '403':
          description: Permisiuni insuficiente

  /admin/uploads:
    get:
      summary: Listeaza fisierele uploadate
      description: Intoarce lista fisierelor din directorul uploads.
      responses:
        '200':
          description: Lista returnata cu succes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileList'
        '403':
          description: Permisiuni insuficiente

  /admin/reports:
    get:
      summary: Listeaza rapoartele generate
      description: Intoarce lista fisierelor din directorul reports.
      responses:
        '200':
          description: Lista returnata cu succes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileList'
        '403':
          description: Permisiuni insuficiente

  /health:
    get:
      summary: Verifica daca serverul ruleaza
      responses:
        '200':
          description: Server functional
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: running

components:
  schemas:
    LoginRequest:
      type: object
      properties:
        username:
          type: string
          example: user1
        password:
          type: string
          example: pass1

    LoginResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        role:
          type: string
          example: user

    AnalysisResult:
      type: object
      properties:
        project:
          type: string
          example: PCD T17 Semantic Analyzer
        sourceFile:
          type: string
          example: sample.c
        diagnosticsCount:
          type: integer
          example: 0
        functionsCount:
          type: integer
          example: 3
        variablesCount:
          type: integer
          example: 8
        ifStatementsCount:
          type: integer
          example: 1
        forLoopsCount:
          type: integer
          example: 1
        whileLoopsCount:
          type: integer
          example: 0
        diagnostics:
          type: array
          items:
            type: string

    ServerStats:
      type: object
      properties:
        status:
          type: string
          example: running
        analyzedFiles:
          type: integer
          example: 2
        lastFile:
          type: string
          example: sample.c

    FileList:
      type: object
      properties:
        files:
          type: array
          items:
            type: string
          example:
            - sample.c
            - bad.c